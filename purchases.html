<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Sales Tracker - Purchases</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📊 Shop Sales Tracker</h1>
            <ul class="nav-links">
                <li><a href="index.html">Sales</a></li>
                <li><a href="purchases.html" class="active">Purchases</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Daily Purchases Entry</h2>
            <p>Record the products you purchased today</p>
        </div>

        <div class="form-section">
            <form id="purchaseForm">
                <div class="form-group">
                    <label for="purchaseDate">Date:</label>
                    <input type="date" id="purchaseDate" required>
                </div>

                <div class="form-group">
                    <label for="productName">Product Name:</label>
                    <input type="text" id="productName" placeholder="Enter product name" required>
                </div>

                <div class="form-group">
                    <label for="supplier">Supplier/Vendor:</label>
                    <input type="text" id="supplier" placeholder="Enter supplier name (optional)">
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity Purchased:</label>
                    <input type="number" id="quantity" placeholder="Enter quantity" min="1" required>
                </div>

                <div class="form-group">
                    <label for="unitCost">Unit Cost ($):</label>
                    <input type="number" id="unitCost" placeholder="Enter unit cost" min="0" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" placeholder="Add any notes (optional)" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Add Purchase</button>
            </form>
        </div>

        <div class="records-section">
            <h3>Purchase Records</h3>
            <div id="purchasesList" class="records-table">
                <p class="empty-message">No purchase records yet. Add your first purchase above!</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
